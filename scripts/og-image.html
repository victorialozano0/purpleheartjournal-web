<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@400;500&family=Caveat:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: linear-gradient(135deg, #1A0A2E 0%, #2D1452 30%, #5B2C8E 70%, #9B4DCA 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Glow effects */
    .glow-1 {
      position: absolute;
      top: -80px;
      right: -60px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(199,125,255,0.3) 0%, transparent 70%);
    }
    .glow-2 {
      position: absolute;
      bottom: -100px;
      left: 100px;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(155,77,202,0.25) 0%, transparent 70%);
    }
    .glow-3 {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(199,125,255,0.1) 0%, transparent 70%);
    }

    /* Stars / sparkles */
    .star {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
    }
    .star:nth-child(4) { top: 80px; left: 150px; width: 3px; height: 3px; opacity: 0.4; }
    .star:nth-child(5) { top: 120px; right: 200px; width: 5px; height: 5px; opacity: 0.5; }
    .star:nth-child(6) { bottom: 150px; left: 300px; width: 3px; height: 3px; opacity: 0.3; }
    .star:nth-child(7) { top: 200px; left: 500px; width: 2px; height: 2px; opacity: 0.5; }
    .star:nth-child(8) { bottom: 100px; right: 350px; width: 4px; height: 4px; opacity: 0.4; }

    .container {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 70px;
      padding: 0 80px;
      width: 100%;
    }

    /* Journal mockup */
    .mockup {
      flex-shrink: 0;
      width: 280px;
      height: 373px;
      background: linear-gradient(145deg, #F3EAFA 0%, #E0D0F0 50%, #d4bce8 100%);
      border-radius: 14px;
      box-shadow:
        0 25px 60px rgba(0,0,0,0.4),
        0 0 40px rgba(199,125,255,0.2),
        inset 0 1px 0 rgba(255,255,255,0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 25px;
      position: relative;
      overflow: hidden;
    }

    .mockup::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%);
      border-radius: 12px 12px 0 0;
    }

    .mockup-heart {
      font-size: 52px;
      margin-bottom: 18px;
      filter: drop-shadow(0 2px 8px rgba(155,77,202,0.3));
    }

    .mockup-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-style: italic;
      font-size: 28px;
      color: #5B2C8E;
      text-align: center;
      line-height: 1.3;
      margin-bottom: 12px;
    }

    .mockup-subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: #9B4DCA;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 22px;
    }

    .mockup-line {
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #C77DFF, transparent);
      margin-bottom: 18px;
    }

    .mockup-chapters {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: #6B5B7B;
      text-align: center;
      line-height: 1.8;
    }

    /* Text content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .badge {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      color: #C77DFF;
      text-transform: uppercase;
      letter-spacing: 4px;
      font-weight: 500;
    }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-style: italic;
      font-size: 68px;
      color: #FDFBFF;
      line-height: 1.1;
    }

    .title span {
      color: #C77DFF;
    }

    .subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: 26px;
      color: rgba(224,208,240,0.9);
      line-height: 1.4;
      max-width: 480px;
    }

    .divider {
      width: 70px;
      height: 2px;
      background: linear-gradient(90deg, #C77DFF, transparent);
    }

    .details {
      font-family: 'DM Sans', sans-serif;
      font-size: 20px;
      color: rgba(224,208,240,0.6);
      letter-spacing: 1px;
    }

    /* Border frame */
    .frame {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      bottom: 16px;
      border: 1px solid rgba(199,125,255,0.12);
      border-radius: 8px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="glow-3"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="frame"></div>

  <div class="container">
    <!-- Journal mockup -->
    <div class="mockup">
      <div class="mockup-heart">💜</div>
      <div class="mockup-title">Purple Heart<br>Journal</div>
      <div class="mockup-subtitle">BTS Edition</div>
      <div class="mockup-line"></div>
      <div class="mockup-chapters">
        7 capítulos · 85+ ejercicios<br>
        35 canciones de BTS
      </div>
    </div>

    <!-- Text -->
    <div class="content">
      <div class="badge">Journal Digital</div>
      <div class="title">Purple Heart<br><span>Journal</span></div>
      <div class="subtitle">Escribe, siente y sana con la música de BTS</div>
      <div class="divider"></div>
      <div class="details">165 páginas · 7 capítulos · Descarga inmediata</div>
    </div>
  </div>
</body>
</html>
