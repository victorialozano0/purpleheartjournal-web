<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0D0F0"/>
      <stop offset="30%" stop-color="#C77DFF"/>
      <stop offset="70%" stop-color="#9B4DCA"/>
      <stop offset="100%" stop-color="#5B2C8E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F3EAFA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C77DFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer glow -->
  <path d="M64 118 C64 118 12 76 12 42 C12 22 28 8 46 8 C56 8 62 14 64 18 C66 14 72 8 82 8 C100 8 116 22 116 42 C116 76 64 118 64 118Z" fill="#C77DFF" opacity="0.25" filter="url(#softGlow)"/>
  <!-- Heart shape -->
  <path d="M64 112 C64 112 16 72 16 42 C16 24 30 12 46 12 C55 12 61 17 64 22 C67 17 73 12 82 12 C98 12 112 24 112 42 C112 72 64 112 64 112Z" fill="url(#heartGrad)"/>
  <!-- Inner highlight -->
  <path d="M64 112 C64 112 16 72 16 42 C16 24 30 12 46 12 C55 12 61 17 64 22 C67 17 73 12 82 12 C98 12 112 24 112 42 C112 72 64 112 64 112Z" fill="url(#glow)"/>
</svg>
